apiVersion: v1
kind: Secret
metadata:
  name: dash0-credentials
  namespace: observability
type: Opaque
stringData:
  # Replace with your actual Dash0 auth token.
  # Get it from: Dash0 → Organization Settings → Auth Tokens
  auth-token: "Bearer REPLACE_ME_WITH_YOUR_DASH0_AUTH_TOKEN"
  # Replace with your Dash0 OTLP ingestion endpoint (for the collector).
  # Format: ingress.<region>.aws.dash0.com:4317
  # Example: ingress.eu-west-1.aws.dash0.com:4317
  endpoint: "ingress.us-west-2.aws.dash0.com:4317"
  # Replace with your Dash0 API base URL (for querying via Prometheus API).
  # Format: https://api.<region>.aws.dash0.com
  # Example: https://api.us-west-2.aws.dash0.com
  api-url: "https://api.us-west-2.aws.dash0.com"
